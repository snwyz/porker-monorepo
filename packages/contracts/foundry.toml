[profile.default]
src = "src"
test = "test"
script = "script"
out = "out"
cache_path = "cache"
libs = ["node_modules"]
solc_version = "0.8.30"
optimizer = true
optimizer_runs = 200
remappings = ["@openzeppelin/contracts/=node_modules/@openzeppelin/contracts/"]

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true

[fuzz]
runs = 256
