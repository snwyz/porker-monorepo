services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: poker_test
      POSTGRES_USER: poker
      POSTGRES_PASSWORD: poker
    ports:
      - "127.0.0.1:55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U poker -d poker_test"]
      interval: 1s
      timeout: 3s
      retries: 30
    tmpfs:
      - /var/lib/postgresql/data
