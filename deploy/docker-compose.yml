name: poker-points

services:
  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      web:
        condition: service_healthy
      game-server:
        condition: service_healthy
    networks:
      - edge
      - private
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 128M

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      APP_MODE: points
      GAME_SERVER_URL: http://game-server:3001
      HOSTNAME: 0.0.0.0
      PORT: 3000
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 30s
    depends_on:
      game-server:
        condition: service_healthy
    networks:
      - private
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 768M

  game-server:
    build:
      context: ..
      dockerfile: apps/game-server/Dockerfile
    restart: unless-stopped
    command:
      [
        "sh",
        "-c",
        "./packages/db/node_modules/.bin/prisma migrate deploy --schema packages/db/prisma/schema.prisma && node apps/game-server/dist/apps/game-server/src/main.js",
      ]
    environment:
      APP_MODE: points
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-poker}:${POSTGRES_PASSWORD:-change-me-before-production}@postgres:5432/${POSTGRES_DB:-poker}
      REDIS_URL: redis://redis:6379
      POKER_AUDIT_KEY: ${POKER_AUDIT_KEY:-change-me-with-at-least-32-bytes}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/health/ready').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - private
    deploy:
      resources:
        limits:
          cpus: "2.00"
          memory: 1G

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-poker}
      POSTGRES_USER: ${POSTGRES_USER:-poker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-before-production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - private
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 1G

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - private
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

networks:
  edge:
  private:
    internal: true

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  redis_data:
