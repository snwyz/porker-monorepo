services:
  poker-web:
    build:
      args:
        APP_MODE: web3
        NEXT_PUBLIC_POKER_TOKEN_ADDRESS: ${NEXT_PUBLIC_POKER_TOKEN_ADDRESS}
        NEXT_PUBLIC_ESCROW_ADDRESS: ${NEXT_PUBLIC_ESCROW_ADDRESS}
        NEXT_PUBLIC_WALLET_LOGIN_DOMAIN: ${NEXT_PUBLIC_WALLET_LOGIN_DOMAIN}
        NEXT_PUBLIC_WALLET_LOGIN_URI: ${NEXT_PUBLIC_WALLET_LOGIN_URI}
        NEXT_PUBLIC_REOWN_PROJECT_ID: ${NEXT_PUBLIC_REOWN_PROJECT_ID:-}
    environment:
      APP_MODE: web3
      NEXT_PUBLIC_POKER_TOKEN_ADDRESS: ${NEXT_PUBLIC_POKER_TOKEN_ADDRESS}
      NEXT_PUBLIC_ESCROW_ADDRESS: ${NEXT_PUBLIC_ESCROW_ADDRESS}
      NEXT_PUBLIC_WALLET_LOGIN_DOMAIN: ${NEXT_PUBLIC_WALLET_LOGIN_DOMAIN}
      NEXT_PUBLIC_WALLET_LOGIN_URI: ${NEXT_PUBLIC_WALLET_LOGIN_URI}

  poker-api:
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      APP_MODE: web3
      CHAIN_ID: ${CHAIN_ID}
      CHAIN_RPC_URL: ${CHAIN_RPC_URL}
      CHAIN_START_BLOCK: ${CHAIN_START_BLOCK}
      CHAIN_CONFIRMATIONS: ${CHAIN_CONFIRMATIONS:-3}
      ESCROW_ADDRESS: ${ESCROW_ADDRESS}
      OPERATOR_ADDRESS: ${OPERATOR_ADDRESS}
      OPERATOR_PRIVATE_KEY: ${OPERATOR_PRIVATE_KEY}
      WALLET_LOGIN_DOMAIN: ${WALLET_LOGIN_DOMAIN}
      WALLET_LOGIN_URI: ${WALLET_LOGIN_URI}
